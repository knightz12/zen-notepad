<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Zen Notepad</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">

      <div class="sidebar-header">
        <span class="logo">Zen Notepad</span>
        <button id="pinSidebar" class="pin-btn" title="Pin sidebar">⧉</button>
      </div>

      <div class="sidebar-actions">
        <button class="side-btn" onclick="newFile()">+ New File</button>
        <button class="side-btn" onclick="openFile()">Open File</button>
      </div>

      <div id="tabs" class="tabs"></div>
    </aside>

    <main class="main">
      <div class="window-buttons">
        <button class="win-btn min-btn" onclick="window.zenAPI.minimize()">—</button>

        <button class="win-btn max-btn" onclick="window.zenAPI.maximize()">
          <span></span>
        </button>
        
        <button class="win-btn close-btn" onclick="window.zenAPI.close()">✕</button>
      </div>

      <div class="topbar">
        <span id="fileName">Untitled</span>
        <button onclick="saveFile()">Save</button>
        <button onclick="toggleWrap()" id="wrapBtn" class="wrap-btn">Wrap</button>
      </div>

      <div id="findBar" class="find-bar hidden">
        <div class="find-container">
          <div class="find-row">
            <div class="find-input-wrap">
              <input id="findInput" type="text" placeholder="Find" />
              <span id="matchCount" class="match-count">0/0</span>

              <button class="find-inside-btn" onclick="clearFind()" title="Clear">✕</button>
              <button class="find-inside-btn" onclick="findNext()" title="Find">⌕</button>
            </div>

            <div class="find-icons">
              <button onclick="findPrev()" title="Previous">↑</button>
              <button onclick="findNext()" title="Next">↓</button>

              <div class="divider"></div>

              <button onclick="toggleReplace()" title="Replace options">☷</button>
              <button onclick="closeFind()" title="Close">✕</button>
            </div>
          </div>

          <div id="replaceRow" class="replace-row hidden">
            <input id="replaceInput" type="text" placeholder="Replace" />

            <button class="replace-btn" onclick="replaceOne()">Replace</button>
            <button class="replace-btn" onclick="replaceAll()">Replace all</button>
          </div>
        </div>
      </div>

      <textarea id="editor" spellcheck="false"></textarea>

      <div id="status" class="status">
        Line 1, Col 0 • Auto-save ON
      </div>
    </main>
  </div>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-box">
      <h2>Zen Notepad</h2>
      <p id="confirmText">Do you want to save changes?</p>

      <div class="modal-actions">
        <button id="confirmSave">Save</button>
        <button id="confirmDont">Don't save</button>
        <button id="confirmCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
